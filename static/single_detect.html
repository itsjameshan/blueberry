<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单图检测 - 蓝莓成熟度检测</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/single_detect.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/index" class="nav-logo-link">🫐</a>
            <span class="nav-title">蓝莓成熟度检测系统</span>
        </div>
        <div class="nav-right">
            <a href="/index" class="nav-link">首页</a>
            <a href="/single_detect" class="nav-link active">单图检测</a>
            <a href="/batch_detect" class="nav-link">批量检测</a>
            <a href="/big_image" class="nav-link">大图检测</a>
            <a href="/result" class="nav-link">检测记录</a>
            {% if role == 'admin' %}
            <a href="/admin" class="nav-link nav-admin">管理后台</a>
            {% endif %}
            <div class="user-info">
                <span class="user-avatar">{{ username[0] | upper }}</span>
                <span class="user-name">{{ username }}</span>
            </div>
            <a href="/logout" class="btn-logout">退出</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="page-header">
            <h1>📸 单张图片检测</h1>
            <p>上传一张蓝莓图片，系统将自动识别成熟度并标注检测框</p>
        </div>

        <div class="detect-layout">
            <div class="card card-upload">
                <div class="card-header">
                    <h2>上传图片</h2>
                </div>
                <div class="card-body">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-placeholder">
                            <span class="upload-icon">📤</span>
                            <p>点击或拖拽图片到此处</p>
                            <span class="upload-hint">支持 JPG、PNG 格式</span>
                        </div>
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <img id="preview" class="preview-hidden" alt="预览">
                    </div>
                    <div class="detect-controls">
                        <div class="control-item">
                            <label>置信度阈值：<span id="confValue">0.5</span></label>
                            <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.5">
                        </div>
                        <button id="detectBtn" class="btn-detect" disabled>🚀 开始检测</button>
                    </div>
                </div>
            </div>

            <div class="card card-result" id="resultCard" style="display:none;">
                <div class="card-header">
                    <h2>📊 检测结果</h2>
                </div>
                <div class="card-body">
                    <div class="result-layout">
                        <div class="result-image">
                            <div class="image-highlight-container" id="highlightContainer">
                                <img id="resultImg" alt="检测结果">
                                <canvas id="highlightCanvas" class="highlight-canvas"></canvas>
                            </div>
                        </div>
                        <div class="result-stats">
                            <div class="stat-item stat-ripe">
                                <span class="stat-dot"></span>
                                <span class="stat-label">成熟蓝莓</span>
                                <span class="stat-value" id="ripeCount">0</span>
                            </div>
                            <div class="stat-item stat-semi">
                                <span class="stat-dot"></span>
                                <span class="stat-label">半熟蓝莓</span>
                                <span class="stat-value" id="semiCount">0</span>
                            </div>
                            <div class="stat-item stat-unripe">
                                <span class="stat-dot"></span>
                                <span class="stat-label">未熟蓝莓</span>
                                <span class="stat-value" id="unripeCount">0</span>
                            </div>
                            <div class="stat-item stat-total">
                                <span class="stat-label">总计检测框</span>
                                <span class="stat-value" id="totalCount">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="result-table-wrap">
                        <table class="result-table" id="resultTableBody">
                            <thead><tr><th>序号</th><th>类别</th><th>置信度</th><th>坐标 (x1,y1,x2,y2)</th></tr></thead>
                            <tbody></tbody>
                        </table>
                        <p class="no-result" id="noResult" style="display:none;">未检测到蓝莓</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <div class="loading-spinner"></div>
        <p>正在检测中...</p>
    </div>

    <script src="{{ url_for('static', filename='js/single_detect.js') }}"></script>
    <div class="model-info-bar" id="modelInfoBar">
        <span class="model-icon">🧠</span>
        <span class="model-text" id="modelInfoText">模型: 加载中...</span>
    </div>
    <script>
        async function loadModelInfo() {
            try {
                const resp = await fetch('/api/current_model');
                const data = await resp.json();
                if (data.success) {
                    const status = data.model_loaded ? '已加载' : '未加载';
                    document.getElementById('modelInfoText').textContent = '模型: ' + data.model_name + ' (' + status + ')';
                }
            } catch(e) {}
        }
        loadModelInfo();
    </script>
</body>
</html>
